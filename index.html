<!DOCTYPE html>

            "outline": "#737686",

  <style>
    body {
      background-color: #f8f9fa;
      color: #191c1d;
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .progress-bar-glow {
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.2);
    }
    .asymmetric-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 1024px) {
      .asymmetric-grid {
        grid-template-columns: 1fr;
      }
    }
    .doodle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.03;
      pointer-events: none;
    }
    .doodle-shape {
      position: absolute;
      fill: none;
      stroke: #004ac6;
      stroke-width: 1.5;
    }
  </style>
</head>
<body class="bg-background min-h-screen">
  <svg class="doodle-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="doodle-shape" cx="15" cy="15" r="8"/>
    <circle class="doodle-shape" cx="85" cy="25" r="5"/>
    <circle class="doodle-shape" cx="50" cy="90" r="6"/>
    <path class="doodle-shape" d="M20 40 Q30 35 40 40 T60 40"/>
    <path class="doodle-shape" d="M70 60 Q75 55 80 60 T90 60"/>
    <path class="doodle-shape" d="M10 70 Q15 65 20 70 T30 70"/>
    <rect class="doodle-shape" x="70" y="70" width="10" height="10" rx="2"/>
    <rect class="doodle-shape" x="40" y="10" width="6" height="6" rx="1"/>
  </svg>
  <main class="max-w-container-max mx-auto px-gutter py-stack-lg">
    <div class="text-center mb-stack-lg">
      <h1 class="font-headline-lg text-headline-lg mb-2">BlueLedger</h1>
      <p class="font-body-md text-body-md text-text-muted">Wealth Management Dashboard</p>
    </div>
    <div class="flex justify-center gap-4 mb-stack-md">
      <a href="login.html" class="bg-primary text-on-primary px-6 py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity">Sign In</a>
      <a href="register.html" class="border border-primary text-primary px-6 py-2 rounded-lg font-semibold hover:bg-surface-container-low transition-colors">Sign Up</a>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-stack-md">
      <a href="dashboard.html" class="bg-surface-white p-6 rounded-xl border border-border-subtle shadow-sm hover:shadow-md transition-shadow block">
        <h3 class="font-headline-md text-headline-md mb-2">Dashboard</h3>
        <p class="text-body-sm text-text-muted">Total Net Worth overview and quick stats</p>
      </a>
      <a href="reports.html" class="bg-surface-white p-6 rounded-xl border border-border-subtle shadow-sm hover:shadow-md transition-shadow block">
        <h3 class="font-headline-md text-headline-md mb-2">Reports</h3>
        <p class="text-body-sm text-text-muted">Analyze spending and income patterns</p>
      </a>
      <a href="transactions.html" class="bg-surface-white p-6 rounded-xl border border-border-subtle shadow-sm hover:shadow-md transition-shadow block">
        <h3 class="font-headline-md text-headline-md mb-2">Transactions</h3>
        <p class="text-body-sm text-text-muted">View and manage all transactions</p>
      </a>
    </div>
  </main>
</body>
</html>
