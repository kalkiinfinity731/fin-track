<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Profile - BlueLedger</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#004ac6",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "on-primary-container": "#eeefff",
            "surface-white": "#ffffff",
            "border-subtle": "#E5E7EB",
            "on-secondary-fixed-variant": "#404758",
            "text-muted": "#6B7280",
            "on-surface": "#191c1d",
            "surface": "#f8f9fa",
            "surface-container": "#edeeef",
            "surface-container-low": "#f3f4f5"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "stack-lg": "2rem",
            "gutter": "1.5rem",
            "stack-sm": "0.5rem",
            "stack-md": "1rem"
          },
          fontFamily: {
            "headline-lg": ["Inter"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-md": ["Inter"],
            "headline-md": ["Inter"]
          },
          fontSize: {
            "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .doodle-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.02; pointer-events: none; }
    .doodle-shape { fill: none; stroke: #004ac6; stroke-width: 1; }
  </style>
</head>
<body class="bg-background min-h-screen">
  <svg class="doodle-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="doodle-shape" cx="10" cy="10" r="5"/>
    <circle class="doodle-shape" cx="90" cy="20" r="4"/>
    <circle class="doodle-shape" cx="50" cy="95" r="6"/>
    <path class="doodle-shape" d="M20 40 Q30 30 40 40 T60 40"/>
    <path class="doodle-shape" d="M65 60 Q70 50 75 60 T90 60"/>
    <path class="doodle-shape" d="M5 75 Q10 65 15 75 T25 75"/>
    <rect class="doodle-shape" x="75" y="80" width="8" height="8" rx="1"/>
    <rect class="doodle-shape" x="40" y="10" width="5" height="5" rx="1"/>
  </svg>
  <aside class="hidden lg:flex flex-col h-screen fixed left-0 top-0 p-gutter w-64 bg-surface-white border-r border-border-subtle z-50">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center text-on-primary-container">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
      </div>
      <div>
        <h1 class="font-headline-md text-headline-md font-bold text-primary">BlueLedger</h1>
        <p class="text-label-sm text-text-muted">Wealth Management</p>
      </div>
    </div>
    <nav class="flex-1 space-y-2">
      <a class="flex items-center gap-3 px-4 py-3 text-on-secondary-fixed-variant hover:bg-surface-container transition-all rounded-lg" href="dashboard.html">
        <span class="material-symbols-outlined">dashboard</span> Dashboard
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-secondary-fixed-variant hover:bg-surface-container transition-all rounded-lg" href="transactions.html">
        <span class="material-symbols-outlined">receipt_long</span> Transactions
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-secondary-fixed-variant hover:bg-surface-container transition-all rounded-lg" href="reports.html">
        <span class="material-symbols-outlined">analytics</span> Reports
      </a>
      <a class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container rounded-lg font-semibold scale-95 transition-transform duration-150" href="profile.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span> Profile
      </a>
    </nav>
    <div class="mt-auto space-y-2">
      <a class="flex items-center gap-3 px-4 py-2 text-on-secondary-fixed-variant hover:bg-surface-container transition-all rounded-lg" href="#">
        <span class="material-symbols-outlined">logout</span> Log Out
      </a>
    </div>
  </aside>
  
  <main class="lg:ml-64 pt-24 px-gutter max-w-container-max mx-auto">
    <div class="mb-stack-lg">
      <h1 class="font-headline-lg text-headline-lg mb-2">Profile</h1>
      <p class="font-body-md text-body-md text-text-muted">Manage your account settings</p>
    </div>
    <div class="bg-surface-white border border-border-subtle rounded-xl p-8">
      <div class="flex items-center gap-6 mb-stack-lg">
        <div id="profile-avatar" class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container text-3xl font-bold"></div>
        <div>
          <h2 id="profile-display-name" class="font-headline-md text-headline-md"></h2>
          <p id="profile-display-email" class="text-label-md text-text-muted"></p>
        </div>
      </div>
      <div class="space-y-stack-md">
        <div>
          <label class="text-label-sm font-label-sm text-on-surface mb-1 block">Full Name</label>
          <input id="profile-name" class="w-full px-4 py-2 border border-border-subtle rounded-lg"/>
        </div>
        <div>
          <label class="text-label-sm font-label-sm text-on-surface mb-1 block">Email</label>
          <input id="profile-email" class="w-full px-4 py-2 border border-border-subtle rounded-lg"/>
        </div>
        <div>
          <label class="text-label-sm font-label-sm text-on-surface mb-1 block">Currency</label>
          <select id="profile-currency" class="w-full px-4 py-2 border border-border-subtle rounded-lg">
            <option>INR - ₹ (Indian Rupee)</option>
            <option>USD - $ (US Dollar)</option>
            <option>EUR - € (Euro)</option>
          </select>
        </div>
        <div>
          <label class="text-label-sm font-label-sm text-on-surface mb-1 block">Phone</label>
          <input id="profile-phone" class="w-full px-4 py-2 border border-border-subtle rounded-lg" placeholder="Enter phone number"/>
        </div>
        <button id="save-profile" class="bg-primary text-on-primary px-6 py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity">Save Changes</button>
      </div>
    </div>
  </main>
  <!-- Popup Modal -->
  <div id="profile-popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-surface-white rounded-2xl p-6 max-w-sm w-full mx-4 transform transition-all duration-300 scale-95 opacity-0" id="profile-popup-content">
      <div class="flex items-center gap-3 mb-4">
        <span class="material-symbols-outlined text-2xl" id="profile-popup-icon">info</span>
        <h3 class="text-headline-md font-headline-md" id="profile-popup-title">Notification</h3>
      </div>
      <p class="text-body-md text-text-muted mb-6" id="profile-popup-message"></p>
      <button class="w-full bg-primary text-on-primary py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity" id="profile-popup-close">OK</button>
    </div>
  </div>
  <nav class="lg:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface-white py-3 px-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] border-t border-border-subtle rounded-t-xl">
    <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors py-1 px-3 rounded-lg" href="dashboard.html">
      <span class="material-symbols-outlined">home</span>
      <span class="text-label-sm font-label-sm">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors py-1 px-3 rounded-lg" href="transactions.html">
      <span class="material-symbols-outlined">list_alt</span>
      <span class="text-label-sm font-label-sm">Txns</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors py-1 px-3 rounded-lg" href="reports.html">
      <span class="material-symbols-outlined">analytics</span>
      <span class="text-label-sm font-label-sm">Reports</span>
    </a>
    <a class="flex flex-col items-center justify-center text-primary font-bold scale-90 transition-transform py-1 px-3 rounded-lg" href="profile.html">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
      <span class="text-label-sm font-label-sm">Profile</span>
    </a>
  </nav>
  <script>
    function getCurrentUser() {
      const userStr = localStorage.getItem('currentUser');
      return userStr ? JSON.parse(userStr) : null;
    }
    
    function setCurrentUser(user) {
      localStorage.setItem('currentUser', JSON.stringify(user));
    }
    
    function loadUserData() {
      const user = getCurrentUser();
      if (user) {
        document.getElementById('profile-name').value = user.name || '';
        document.getElementById('profile-email').value = user.email || '';
        document.getElementById('profile-display-name').textContent = user.name || 'User';
        document.getElementById('profile-display-email').textContent = user.email || '';
        document.getElementById('profile-avatar').textContent = (user.name || 'U').charAt(0);
      }
    }
    
    function showProfilePopup(message, type) {
      const popup = document.getElementById('profile-popup');
      const content = document.getElementById('profile-popup-content');
      const msgEl = document.getElementById('profile-popup-message');
      const iconEl = document.getElementById('profile-popup-icon');
      const titleEl = document.getElementById('profile-popup-title');
      
      msgEl.textContent = message;
      if (type === 'success') {
        iconEl.textContent = 'check_circle';
        iconEl.className = 'material-symbols-outlined text-2xl text-green-600';
        titleEl.textContent = 'Success';
      } else {
        iconEl.textContent = 'error';
        iconEl.className = 'material-symbols-outlined text-2xl text-red-600';
        titleEl.textContent = 'Error';
      }
      
      popup.classList.remove('hidden');
      setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);
    }
    
    function hideProfilePopup() {
      const popup = document.getElementById('profile-popup');
      const content = document.getElementById('profile-popup-content');
      content.classList.add('scale-95', 'opacity-0');
      setTimeout(() => popup.classList.add('hidden'), 300);
    }
    
    document.getElementById('profile-popup-close').addEventListener('click', hideProfilePopup);
    
    document.getElementById('save-profile').addEventListener('click', () => {
      const user = getCurrentUser();
      const name = document.getElementById('profile-name').value;
      const email = document.getElementById('profile-email').value;
      const phone = document.getElementById('profile-phone').value;
      
      if (!name || !email) {
        showProfilePopup('Name and email are required', 'error');
        return;
      }
      
      fetch('/api/auth/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: user ? user.email : '', name, phone })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showProfilePopup('Profile updated successfully', 'success');
          setCurrentUser(data.user);
          loadUserData();
        } else {
          showProfilePopup(data.message || 'Update failed', 'error');
        }
      });
    });
    
    document.addEventListener('DOMContentLoaded', loadUserData);
  </script>
</body>
</html>
