<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - BlueLedger</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#004ac6",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "on-primary-container": "#eeefff",
            "surface-white": "#ffffff",
            "border-subtle": "#E5E7EB",
            "on-secondary-fixed-variant": "#404758",
            "text-muted": "#6B7280"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "stack-lg": "2rem",
            "gutter": "1.5rem",
            "stack-sm": "0.5rem",
            "stack-md": "1rem"
          },
          fontFamily: {
            "headline-lg": ["Inter"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-sm": ["Inter"]
          },
          fontSize: {
            "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .focus-ring-blue:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .doodle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.05;
      pointer-events: none;
    }
    .doodle-shape {
      fill: none;
      stroke: #004ac6;
      stroke-width: 1.5;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <svg class="doodle-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="doodle-shape" cx="10" cy="10" r="6"/>
    <circle class="doodle-shape" cx="90" cy="20" r="4"/>
    <circle class="doodle-shape" cx="45" cy="95" r="5"/>
    <path class="doodle-shape" d="M15 30 Q25 20 35 30 T55 30"/>
    <path class="doodle-shape" d="M65 50 Q70 40 75 50 T90 50"/>
    <path class="doodle-shape" d="M5 60 Q10 55 15 60 T25 60"/>
    <rect class="doodle-shape" x="75" y="75" width="8" height="8" rx="1.5"/>
    <rect class="doodle-shape" x="35" y="5" width="5" height="5" rx="1"/>
  </svg>
  <main class="w-full max-w-md flex flex-col items-center">
    <header class="text-center mb-8">
      <div class="bg-primary w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-6 shadow-sm">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h1>
      <p class="text-gray-600 text-lg">Log in to your account</p>
    </header>
    <section class="bg-surface-white w-full rounded-3xl border border-border-subtle shadow-sm p-8">
      <div class="flex flex-col gap-4">
        <input class="w-full px-4 py-3 border border-border-subtle rounded-lg focus-ring-blue text-body-sm" placeholder="Email address" type="email"/>
        <input class="w-full px-4 py-3 border border-border-subtle rounded-lg focus-ring-blue text-body-sm" placeholder="Password" type="password"/>
        <button id="signin-btn" class="w-full bg-primary text-on-primary py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity">Sign In</button>
      </div>
      <p class="text-center text-label-sm text-text-muted mt-6">
        Don't have an account? <a href="register.html" class="text-primary font-semibold hover:underline">Sign up</a>
      </p>
    </section>
  </main>
  
  <!-- Popup Modal -->
  <div id="popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-surface-white rounded-2xl p-6 max-w-sm w-full mx-4 transform transition-all duration-300 scale-95 opacity-0" id="popup-content">
      <div class="flex items-center gap-3 mb-4">
        <span class="material-symbols-outlined text-2xl" id="popup-icon">info</span>
        <h3 class="text-headline-md font-headline-md" id="popup-title">Notification</h3>
      </div>
      <p class="text-body-md text-text-muted mb-6" id="popup-message"></p>
      <button class="w-full bg-primary text-on-primary py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity" id="popup-close">OK</button>
    </div>
  </div>
  
  <script>
    function setCurrentUser(user) {
      localStorage.setItem('currentUser', JSON.stringify(user));
    }
    
    function showPopup(message, type) {
      const popup = document.getElementById('popup');
      const content = document.getElementById('popup-content');
      const msgEl = document.getElementById('popup-message');
      const iconEl = document.getElementById('popup-icon');
      const titleEl = document.getElementById('popup-title');
      
      msgEl.textContent = message;
      
      if (type === 'success') {
        iconEl.textContent = 'check_circle';
        iconEl.className = 'material-symbols-outlined text-2xl text-green-600';
        titleEl.textContent = 'Success';
      } else if (type === 'error') {
        iconEl.textContent = 'error';
        iconEl.className = 'material-symbols-outlined text-2xl text-red-600';
        titleEl.textContent = 'Error';
      } else {
        iconEl.textContent = 'info';
        iconEl.className = 'material-symbols-outlined text-2xl text-primary';
        titleEl.textContent = 'Info';
      }
      
      popup.classList.remove('hidden');
      setTimeout(() => {
        content.classList.remove('scale-95', 'opacity-0');
      }, 10);
    }
    
    function hidePopup() {
      const popup = document.getElementById('popup');
      const content = document.getElementById('popup-content');
      content.classList.add('scale-95', 'opacity-0');
      setTimeout(() => {
        popup.classList.add('hidden');
      }, 300);
    }
    
    document.getElementById('popup-close').addEventListener('click', hidePopup);
    
    document.getElementById('signin-btn').addEventListener('click', () => {
      const email = document.querySelector('input[type="email"]').value;
      const password = document.querySelector('input[type="password"]').value;
      
      if (!email || !password) {
        showPopup('Please enter both email and password', 'error');
        return;
      }
      
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          setCurrentUser(data.user);
          showPopup('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          showPopup(data.message || 'Invalid credentials', 'error');
        }
      });
    });
  </script>
</body>
</html>
