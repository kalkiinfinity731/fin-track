<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Register - BlueLedger</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#004ac6",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "on-primary-container": "#eeefff",
            "surface-white": "#ffffff",
            "border-subtle": "#E5E7EB",
            "on-secondary-fixed-variant": "#404758",
            "text-muted": "#6B7280"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "stack-lg": "2rem",
            "gutter": "1.5rem",
            "stack-sm": "0.5rem",
            "stack-md": "1rem"
          },
          fontFamily: {
            "headline-lg": ["Inter"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-sm": ["Inter"]
          },
          fontSize: {
            "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .focus-ring-blue:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .doodle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.05;
      pointer-events: none;
    }
    .doodle-shape {
      fill: none;
      stroke: #004ac6;
      stroke-width: 1.5;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <svg class="doodle-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="doodle-shape" cx="5" cy="15" r="5"/>
    <circle class="doodle-shape" cx="95" cy="10" r="7"/>
    <circle class="doodle-shape" cx="55" cy="90" r="6"/>
    <path class="doodle-shape" d="M20 25 Q30 15 40 25 T60 25"/>
    <path class="doodle-shape" d="M70 45 Q75 35 80 45 T90 45"/>
    <path class="doodle-shape" d="M8 55 Q12 48 16 55 T24 55"/>
    <rect class="doodle-shape" x="80" y="80" width="7" height="7" rx="1"/>
    <rect class="doodle-shape" x="25" y="8" width="4" height="4" rx="1"/>
  </svg>
  <main class="w-full max-w-md flex flex-col items-center">
    <header class="text-center mb-8">
      <div class="bg-primary w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-6 shadow-sm">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12 6.477 10 12 10z" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M12 8v8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M8 12h8" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Create account</h1>
      <p class="text-gray-600 text-lg">Join BlueLedger today</p>
    </header>
    <section class="bg-surface-white w-full rounded-3xl border border-border-subtle shadow-sm p-8">
      <div class="flex flex-col gap-4">
        <input class="w-full px-4 py-3 border border-border-subtle rounded-lg focus-ring-blue text-body-sm" placeholder="Full name" type="text"/>
        <input class="w-full px-4 py-3 border border-border-subtle rounded-lg focus-ring-blue text-body-sm" placeholder="Email address" type="email"/>
        <input class="w-full px-4 py-3 border border-border-subtle rounded-lg focus-ring-blue text-body-sm" placeholder="Password" type="password"/>
        <button id="signup-btn" class="w-full bg-primary text-on-primary py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity">Sign Up</button>
      </div>
      <p class="text-center text-label-sm text-text-muted mt-6">
        Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Sign in</a>
      </p>
    </section>
  </main>
  
  <!-- Popup Modal -->
  <div id="popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-surface-white rounded-2xl p-6 max-w-sm w-full mx-4 transform transition-all duration-300 scale-95 opacity-0" id="popup-content">
      <div class="flex items-center gap-3 mb-4">
        <span class="material-symbols-outlined text-2xl" id="popup-icon">info</span>
        <h3 class="text-headline-md font-headline-md" id="popup-title">Notification</h3>
      </div>
      <p class="text-body-md text-text-muted mb-6" id="popup-message"></p>
      <button class="w-full bg-primary text-on-primary py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity" id="popup-close">OK</button>
    </div>
  </div>
  
  <script>
    function setCurrentUser(user) {
      localStorage.setItem('currentUser', JSON.stringify(user));
    }
    
    function showPopup(message, type) {
      const popup = document.getElementById('popup');
      const content = document.getElementById('popup-content');
      const msgEl = document.getElementById('popup-message');
      const iconEl = document.getElementById('popup-icon');
      const titleEl = document.getElementById('popup-title');
      
      msgEl.textContent = message;
      if (type === 'success') {
        iconEl.textContent = 'check_circle';
        iconEl.className = 'material-symbols-outlined text-2xl text-green-600';
        titleEl.textContent = 'Success';
      } else if (type === 'error') {
        iconEl.textContent = 'error';
        iconEl.className = 'material-symbols-outlined text-2xl text-red-600';
        titleEl.textContent = 'Error';
      } else {
        iconEl.textContent = 'info';
        iconEl.className = 'material-symbols-outlined text-2xl text-primary';
        titleEl.textContent = 'Info';
      }
      
      popup.classList.remove('hidden');
      setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);
    }
    
    function hidePopup() {
      const popup = document.getElementById('popup');
      const content = document.getElementById('popup-content');
      content.classList.add('scale-95', 'opacity-0');
      setTimeout(() => popup.classList.add('hidden'), 300);
    }
    
    document.getElementById('popup-close').addEventListener('click', hidePopup);
    
    document.getElementById('signup-btn').addEventListener('click', () => {
      const name = document.querySelector('input[type="text"]').value;
      const email = document.querySelector('input[type="email"]').value;
      const password = document.querySelector('input[type="password"]').value;
      
      if (!name || !email || !password) {
        showPopup('Please fill in all fields', 'error');
        return;
      }
      
      fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          setCurrentUser(data.user);
          showPopup('Account created! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showPopup(data.message || 'Registration failed', 'error');
        }
      });
    });
  </script>
</body>
</html>
